<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="27%" style="stop-color:#2ecc71"/>
      <stop offset="45%" style="stop-color:#f1c40f"/>
      <stop offset="64%" style="stop-color:#e67e22"/>
      <stop offset="73%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="10" y="10" width="380" height="60" rx="12" fill="#1c1c1e" filter="url(#shadow)"/>
  
  <!-- Icon -->
  <circle cx="40" cy="40" r="16" fill="rgba(46,204,113,0.2)"/>
  <text x="40" y="45" font-family="system-ui" font-size="16" fill="#2ecc71" text-anchor="middle">☀️</text>
  
  <!-- Name -->
  <text x="68" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#e0e0e0">UV Index</text>
  
  <!-- Value -->
  <text x="68" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2ecc71">3.0</text>
  
  <!-- Progress Bar Background -->
  <rect x="105" y="44" width="270" height="12" rx="6" fill="url(#barGrad)" opacity="0.6"/>
  
  <!-- Progress Bar Fill -->
  <rect x="105" y="44" width="73" height="12" rx="6" fill="#2ecc71"/>
</svg>
